<!DOCTYPE html>
<html lang="{{ page.lang | default: 'fr' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} — Grid Team</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏁</text></svg>">
<style>
  :root { --bg: #0A0A0A; --card: #141414; --text: #FFFFFF; --muted: #888; --accent: #E10600; --border: rgba(255,255,255,0.08); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Segoe UI, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  header { padding: 28px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: 0 auto; }
  header .brand { font-weight: 900; font-size: 18px; letter-spacing: 0.5px; }
  header .brand .red { color: var(--accent); }
  header nav a { color: var(--muted); text-decoration: none; margin-left: 20px; font-size: 14px; }
  header nav a:hover { color: var(--text); }
  main { max-width: 760px; margin: 0 auto; padding: 48px 24px 96px; }
  h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
  h2 { font-size: 22px; font-weight: 800; margin-top: 40px; margin-bottom: 12px; color: var(--accent); }
  h3 { font-size: 17px; font-weight: 700; margin-top: 24px; margin-bottom: 8px; }
  p, ul, ol { margin-bottom: 14px; color: rgba(255,255,255,0.85); }
  ul, ol { padding-left: 24px; }
  li { margin-bottom: 4px; }
  a { color: var(--accent); }
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: var(--card); font-weight: 700; color: var(--accent); }
  code { background: var(--card); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--muted); margin: 16px 0; font-style: italic; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
  footer { max-width: 900px; margin: 0 auto; padding: 32px 24px; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 12px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="brand">GRID<span class="red">TEAM</span> 🏁</div>
  <nav>
    <a href="/gridteam-legal/">Home</a>
    <a href="/gridteam-legal/privacy">Privacy</a>
    <a href="/gridteam-legal/terms">Terms</a>
  </nav>
</header>
<main>
{{ content }}
</main>
<footer>
  © 2026 Grid Team — Application non officielle F1 &amp; MotoGP<br>
  <a href="mailto:contact@gridteam.app">contact@gridteam.app</a>
</footer>
</body>
</html>
